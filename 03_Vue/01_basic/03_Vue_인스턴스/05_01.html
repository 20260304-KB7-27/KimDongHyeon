<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount" /> <br />
      <button v-on:click="money += amount">입금</button>
      <button v-on:click="money -= amount">인출</button>
      <br />
      <h3>계좌 잔고: {{money}}</h3>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const money = ref(0);
          const amount = ref(0);

          return {
            money,
            amount,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
