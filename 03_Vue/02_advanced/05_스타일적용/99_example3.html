<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>

      <div>
        <input
          type="text"
          v-model.trim="postTitle"
          placeholder="새 게시글 제목"
        />
        <input
          type="text"
          v-model.trim="postContent"
          placeholder="새 게시글 내용"
        />
        <button @click="addPost">작성</button>
      </div>

      <!-- 아래의 목록을 완성하세요 -->
      <ul>
        <li v-for="(post, index) in sortPosts">
          <div
            style="
              display: flex;
              justify-content: space-between;
              text-align: center;
              align-items: center;
            "
          >
            <h2>{{post.no}}. {{post.title}}</h2>
            <div
              class="arrow"
              v-on:click="toggle(post.no)"
              style="cursor: pointer"
            >
              {{ openedNo === post.no ? '▲' : '▼'}}
            </div>
          </div>

          <br />

          <div
            class="post-content"
            v-if="openedNo === post.no && post.no !== fixNo"
          >
            <h1>{{post.title}}</h1>
            <div class="post-item">{{post.content}}</div>
            <button @click="fixPost(post.no)">수정</button>
            <button @click="deletePost(post.no)">삭제</button>
            <button @click="closePost(post.no)">닫기</button>
          </div>

          <div
            class="post-content"
            v-if="fixNo === post.no && openedNo === post.no"
          >
            <input type="text" class="fixTitle" v-model.trim="fixPostTitle" />
            <textarea
              name="content"
              class="fixContnet"
              v-model.trim="fixPostContent"
            ></textarea
            ><br />
            <button @click="fixSave(post.no)">저장</button>
            <button @click="cancelFix(post.no)">취소</button>
          </div>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const openedNo = ref(null);

          const fixNo = ref(null);

          const fixPostContent = ref('');
          const fixPostTitle = ref('');

          const postTitle = ref('');
          const postContent = ref('');

          const toggle = (no) => {
            openedNo.value = openedNo.value === no ? null : no;
          };

          const closePost = (no) => {
            openedNo.value = openedNo.value === no ? null : no;
          };

          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          const sortPosts = computed(() => {
            return [...posts.value].sort((a, b) => b.no - a.no);
          });

          const addPost = () => {
            // 빈문자열 예외처리
            if (postContent.value === '' || postTitle.value === '') return;

            //배열에 추가
            posts.value.push({
              no: posts.value.length + 1,
              title: postTitle.value,
              content: postContent.value,
            });

            // todo 초기화
            postTitle.value = '';
            postContent.value = '';
          };

          const deletePost = (no) => {
            let index = posts.value.findIndex((item) => no === item.no);
            let result = confirm('정말로 삭제하시겠습니까?');

            if (result === true) posts.value.splice(index, 1);
            else return;
          };

          const fixPost = (no) => {
            //fixNo.value = fixNo.value === no ? null : no;
            fixNo.value = no;
            let index = posts.value.findIndex((item) => no === item.no);

            fixPostContent.value = posts.value[index].content;
            fixPostTitle.value = posts.value[index].title;
          };

          const fixSave = (no) => {
            let index = posts.value.findIndex((item) => no === item.no);
            posts.value[index].content = fixPostContent.value;
            posts.value[index].title = fixPostTitle.value;
            fixNo.value = null;
          };

          const cancelFix = (no) => {
            fixNo.value = null;
          };

          return {
            posts,
            openedNo,
            fixNo,
            fixPostContent,
            fixPostTitle,
            toggle,
            sortPosts,
            postContent,
            postTitle,
            addPost,
            closePost,
            deletePost,
            fixPost,
            fixSave,
            cancelFix,
          };
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: left;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }

      .fixTitle {
        width: 100%;
      }

      .fixContnet {
        width: 100%;
        height: 80px;
        margin-top: 5px;
      }
    </style>
  </body>
</html>
