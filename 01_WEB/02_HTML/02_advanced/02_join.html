<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td style="text-align: center">
              <label for="userId">사용자 ID</label>
            </td>
            <td><input id="userId" type="text" name="useid" /></td>
          </tr>
          <tr>
            <td style="text-align: center">
              <label for="password">비밀번호</label>
            </td>
            <td><input id="password" type="password" name="password" /></td>
          </tr>
          <tr>
            <td style="text-align: center">
              <label for="password">비밀번호 확인</label>
            </td>
            <td><input id="password" type="password" name="password" /></td>
          </tr>
          <tr>
            <td style="text-align: center">
              <label for="userName">이름</label>
            </td>
            <td><input id="userName" type="text" name="userName" /></td>
          </tr>
          <tr>
            <td style="text-align: center">성별</td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여</label>
            </td>
          </tr>
          <tr>
            <td style="text-align: center">취미</td>
            <td>
              <input id="soccer" type="checkbox" name="hobby" />
              <label for="soccer">축구</label>
              <input id="baseball" type="checkbox" name="hobby" />
              <label for="baseball">야구</label>
              <input id="volleyball" type="checkbox" name="hobby" />
              <label for="volleyball">배구</label>
              <input id="basketball" type="checkbox" name="hobby" />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <td style="text-align: center"><label for="email">email</label></td>
            <td><input id="email" type="email" name="email" /></td>
          </tr>
          <tr>
            <td style="text-align: center">역할</td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
